<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre of Life</title>
    <!-- Import Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Font classes */
        .silkscreen-bold {
            font-family: "Silkscreen", sans-serif;
            font-weight: 700;
        }
        .silkscreen-regular {
            font-family: "Silkscreen", sans-serif;
            font-weight: 400;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            transition: background 0.3s, color 0.3s;
        }
        .dark-mode {
            background-color: #222;
            color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
        }
        nav a {
            color: #fff;
            padding: 14px 20px;
            text-decoration: none;
            text-transform: uppercase;
        }
        nav a:hover {
            background-color: #555;
        }

        section {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: background 0.3s;
            overflow: visible;
        }
        .dark-mode section {
            background-color: #333;
        }

        /* Columns layout - centralizado */
        .columns {
            display: flex;
            justify-content: center; /* centraliza o bloco inteiro */
            gap: 40px; /* espaço entre colunas */
            flex-wrap: wrap; /* permite quebrar em telas pequenas */
            max-width: 700px; /* largura máxima do bloco centralizado */
            margin: 0 auto; /* centraliza horizontalmente */
        }
        .column {
            flex: 1;
            min-width: 250px;
            text-align: left; /* conteúdo alinhado à esquerda dentro da coluna */
        }

        /* Responsivo: empilhar colunas em telas pequenas */
        @media (max-width: 768px) {
            .columns {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Footer */
        footer {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
        }
        .footer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .footer-center {
            margin: 0;
            text-align: center;
            flex: 1;
        }
        .footer-email {
            position: absolute;
            right: 20px;
            font-size: 18px;
            color: #fff;
            text-decoration: none;
        }
        #lastfm-covers {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .cover-item {
            width: 50px;
            height: 50px;
            image-rendering: pixelated;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .cover-item:hover {
            transform: scale(1.2);
            box-shadow: 2px 2px 0px #000;
        }
        .book-item img {
            width: 45px;
            height: 70px;
            object-fit: cover;
            border: 1px solid #333;
        }
        
    </style>
</head>

<body>
    <header>
        <h1 class="silkscreen-bold">Theatre of Life</h1>
        <button class="toggle-btn" onclick="toggleMode()">◑</button>
    </header>

    <nav>
        <a href="index.html" class="silkscreen-regular">Home</a>
        <a href="journal.html" class="silkscreen-regular">Journal</a>
        <a href="photography.html" class="silkscreen-regular">Photography</a>
    </nav>

    <!-- Main Section: Intro + Reading & Listening -->
    <section>
        <!-- Intro Text + Image -->
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
            <img src="Img/Ricgrey.jpg" alt="my mugshot" 
                 width="150" height="150" 
                 style="border-radius: 50%; object-fit: cover; aspect-ratio: 1/1;">
            <p style="margin: 0; flex: 1;">
                Hello, on this website, you will discover insights into my personal interests, reflections, essays and a collection of photos I have taken along the way. Feel free to explore!
            </p>
        </div>
             <!-- Listening Section (Right) -->
        <div class="column">
                <h4>...listening &#127911;</h4>
                    <div class="retro-player">
                        <div id="lastfm-covers">
                            <!-- Album covers will go here -->
                        </div>
                    </div>
        </div>

            <!-- Reading Section (Right) -->
        <div class="column">
            <h4>...reading &#128218;</h4>
                <div class="bookshelf">

                    <a class="book-item" title="Sacred and Terrible Air — Robert Kurvitz">
                    <img src="https://covers.openlibrary.org/b/isbn/9789949330638-M.jpg" 
                    onerror="this.onerror=null;this.src='./Img/book-placeholder.png';">
                    </a>
                    
                    <a class="book-item" title="Fahrenheit 451 — Ray Bradbury">
                    <img src="https://covers.openlibrary.org/b/isbn/9781451673319-M.jpg" 
                    onerror="this.onerror=null;this.src='./Img/book-placeholder.png';">
                    </a>

                    <a class="book-item" title="Faith, Hope and Carnage — Nick Cave">
                    <img src="https://covers.openlibrary.org/b/isbn/9780374607371-M.jpg" 
                    onerror="this.onerror=null;this.src='./Img/book-placeholder.png';">
                    </a>

                </div>
            </div>

    </section>

    <footer>
        <div class="footer-container">
            <p class="footer-center">&copy; All rights reserved.</p>
            <a href="mailto:ricardo.nga@pm.me" class="footer-email">&#128231;</a>
        </div>
    </footer>

    <script>
        function toggleMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
        }

        window.onload = function() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
            loadLastFMCovers();
            loadSeries();
        };

         // ===== Album covers from LastFM Script =====
        async function loadLastFMCovers() {

            const username = "rnga";
            const apiKey = "70d2032cdf3e812c883566ec806400da";

            const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=20`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                const container = document.getElementById("lastfm-covers");
                container.innerHTML = "";

                const tracks = data.recenttracks.track;
                const seen = new Set();

                for (const track of tracks) {
                    const key = track.name + '|' + track.artist["#text"];
                    if (seen.has(key)) continue;
                        seen.add(key);
                        const img = document.createElement("img");
                        img.className = "cover-item";

                        // Use album art or placeholder
                        img.src = track.image[1]["#text"] || "Img/music-placeholder.png";

                        // Tooltip: song + album
                        img.title = `${track.name} — ${track.artist["#text"]}`;

                        container.appendChild(img);

                    if (seen.size >= 13) break; // show only 10 unique songs
                }

            } catch {
                document.getElementById("lastfm-covers").innerHTML =
                "<p>music unavailable</p>";
                    }
        }
       
        
    </script>
</body>
</html>
